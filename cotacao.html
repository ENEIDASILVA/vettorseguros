<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vettor Seguros - Cotação Automóvel</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #004080; }
    label { display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 8px; margin-top: 5px; }
    .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    button { background: #004080; color: #fff; padding: 10px 20px; border: none; cursor: pointer; }
    button:hover { background: #0066cc; }
  </style>
</head>
<body>
  <h1>Formulário de Cotação - Vettor Seguros</h1>

  <!-- Dados do Segurado -->
  <div class="section">
    <h2>Dados do Segurado</h2>
    <label>Nome Completo</label>
    <input type="text" name="nome" required>
    
    <label>CPF/CNPJ</label>
    <input type="text" name="cpf" required>
    
    <label>Data de Nascimento</label>
    <input type="date" name="nascimento">
    
    <label>Estado Civil</label>
    <select name="estadoCivil">
      <option value="solteiro">Solteiro(a)</option>
      <option value="casado">Casado(a)</option>
      <option value="outro">Outro</option>
    </select>
    
    <label>Celular</label>
    <input type="tel" name="celular">
    
    <label>E-mail</label>
    <input type="email" name="email">
  </div>

  <!-- Dados do Veículo -->
  <div class="section">
    <h2>Dados do Veículo</h2>
    <label>Placa</label>
    <input type="text" name="placa" required>
    
    <label>Chassi</label>
    <input type="text" name="chassi">
    
    <label>Modelo</label>
    <input type="text" name="modelo">
    
    <label>Ano Fabricação</label>
    <input type="number" name="anoFab">
    
    <label>Ano Modelo</label>
    <input type="number" name="anoModelo">
    
    <label>Quilometragem (Km/mês)</label>
    <input type="number" name="kmMes">
  </div>

  <!-- Utilização -->
  <div class="section">
    <h2>Utilização</h2>
    <label>Tipo de Uso</label>
    <select name="uso">
      <option value="particular">Particular</option>
      <option value="trabalho">Trabalho</option>
      <option value="lazer">Lazer</option>
    </select>
    
    <label>CEP de Pernoite</label>
    <input type="text" name="cep">
    
    <label>Tipo de Residência</label>
    <select name="residencia">
      <option value="apartamento">Apartamento</option>
      <option value="casa">Casa</option>
    </select>
  </div>

  <!-- Coberturas -->
  <div class="section">
    <h2>Coberturas</h2>
    <label>Responsabilidade Civil - Danos Materiais (R$)</label>
    <input type="number" name="rcMateriais">
    
    <label>Responsabilidade Civil - Danos Corporais (R$)</label>
    <input type="number" name="rcCorporais">
    
    <label>Danos Morais (R$)</label>
    <input type="number" name="danosMorais">
    
    <label>Assistência 24h</label>
    <select name="assistencia">
      <option value="basico">Básico</option>
      <option value="vip">VIP</option>
    </select>
  </div>

  <button type="submit">Enviar Cotação</button>

  <script>
    document.querySelector("button").addEventListener("click", function() {
      alert("Formulário enviado com sucesso! A Vettor Seguros entrará em contato.");
    });
  </script>
</body>
</html>
