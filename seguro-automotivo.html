<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VETTOR SEGUROS | Cotação Online</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#f5f7fa;
  font-family:Arial, Helvetica, sans-serif;
}
header {
  background:#0A2F5A;
  padding:25px;
  color:white;
  text-align:center;
}
header img {
  max-width:100%;
  height:auto;
}
.card {
  margin-top:30px;
  border:none;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.10);
}
.section-title {
  color:#0A2F5A;
  font-size:22px;
  font-weight:bold;
  margin-top:30px;
  margin-bottom:20px;
  border-bottom:2px solid #C9A227;
  padding-bottom:8px;
}
.btn-vettor {
  background:#0A2F5A;
  color:white;
  padding:15px;
  font-size:18px;
  font-weight:bold;
}
.btn-vettor:hover {
  background:#153f72;
  color:white;
}
.success-message {
  display:none;
  margin-top:20px;
  padding:15px;
  background-color:#d4edda;
  color:#155724;
  border:1px solid #c3e6cb;
  border-radius:5px;
}
</style>
</head>

<body>
<header>
  <h1>VETTOR SEGUROS </h1>
  <p>Solicite sua Cotação Online</p>
  <img src="imagens/banner-principal.jpg" alt="Banner" id="bannerImg">
</header>

<div class="container">
  <div class="card">
    <div class="card-body">

      <!-- Formulário integrado ao Formspree -->
      <form id="cotacaoForm" action="https://formspree.io/f/mlgynkkz" method="POST">
        
        <!-- 1. Dados do Segurado -->
        <div class="section-title">1. Dados do Segurado</div>
        <div class="row">
          <div class="col-md-6"><label>Nome Completo *</label><input class="form-control" name="nome" required></div>
          <div class="col-md-6"><label>CPF *</label><input class="form-control" name="cpf"></div>
          <div class="col-md-4"><label>Data de Nascimento</label><input type="date" class="form-control" name="data_nascimento"></div>
          <div class="col-md-4"><label>Estado Civil</label><input class="form-control" name="estado_civil"></div>
          <div class="col-md-4"><label>Profissão</label><input class="form-control" name="profissao"></div>
          <div class="col-md-6"><label>Escolaridade</label><input class="form-control" name="escolaridade"></div>
          <div class="col-md-6"><label>E-mail</label><input type="email" class="form-control" name="email"></div>
          <div class="col-md-6"><label>Telefone</label><input class="form-control" name="telefone"></div>
          <div class="col-md-6"><label>CEP</label><input class="form-control" name="cep"></div>
          <div class="col-12"><label>Endereço</label><input class="form-control" name="endereco"></div>
        </div>

        <!-- 2. Dados do Veículo -->
        <div class="section-title">2. Dados do Veículo</div>
        <div class="row">
          <div class="col-md-4"><label>Marca</label><input class="form-control" name="marca"></div>
          <div class="col-md-4"><label>Modelo</label><input class="form-control" name="modelo"></div>
          <div class="col-md-4"><label>Ano</label><input class="form-control" name="ano"></div>
          <div class="col-md-4"><label>Placa</label><input class="form-control" name="placa"></div>
          <div class="col-md-4"><label>Chassi</label><input class="form-control" name="chassi"></div>
          <div class="col-md-4"><label>Renavam</label><input class="form-control" name="renavam"></div>
          <div class="col-md-3"><label>Cor</label><input class="form-control" name="cor"></div>
          <div class="col-md-3"><label>Combustível</label><input class="form-control" name="combustivel"></div>
          <div class="col-md-3"><label>KM</label><input class="form-control" name="km"></div>
          <div class="col-md-3"><label>Zero KM?</label><select class="form-select" name="zero_km"><option>Não</option><option>Sim</option></select></div>
          <div class="col-md-4"><label>Possui GNV?</label><select class="form-select" name="gnv"><option>Não</option><option>Sim</option></select></div>
          <div class="col-md-4"><label>Blindado?</label><select class="form-select" name="blindado"><option>Não</option><option>Sim</option></select></div>
          <div class="col-md-4"><label>Alienado?</label><select class="form-select" name="alienado"><option>Não</option><option>Sim</option></select></div>
        </div>

        <!-- 3. Utilização -->
        <div class="section-title">3. Utilização</div>
        <div class="row">
          <div class="col-md-4"><label>Uso</label><select class="form-select" name="uso"><option>Particular</option><option>Comercial</option><option>Aplicativo</option></select></div>
          <div class="col-md-4"><label>CEP de Pernoite</label><input class="form-control" name="cep_pernoite"></div>
          <div class="col-md-4"><label>KM Mensal</label><input class="form-control" name="km_mensal"></div>
          <div class="col-md-6"><label>Garagem</label><select class="form-select" name="garagem"><option>Residência</option><option>Trabalho</option><option>Faculdade</option><option>Não possui</option></select></div>
          <div class="col-md-6"><label>Distância Trabalho</label><input class="form-control" name="distancia_trabalho"></div>
        </div>

        <!-- 4. Principal Condutor -->
        <div class="section-title">4. Principal Condutor</div>
        <div class="row">
          <div class="col-md-6"><label>Nome</label><input class="form-control" name="condutor_nome"></div>
          <div class="col-md-6"><label>CPF</label><input class="form-control" name="condutor_cpf"></div>
          <div class="col-md-4"><label>Data Nascimento</label><input type="date" class="form-control" name="condutor_nascimento"></div>
          <div class="col-md-4"><label>Sexo</label><select class="form-select" name="condutor_sexo"><option>Masculino</option><option>Feminino</option></select></div>
          <div class="col-md-4"><label>CNH</label><input class="form-control" name="condutor_cnh"></div>
        </div>

        <!-- 5. Seguro Atual -->
        <div class="section-title">5. Seguro Atual</div>
        <div class="row">
          <div class="col-md-4"><label>Novo ou Renovação</label><select class="form-select" name="seguro_tipo"><option>Novo</option><option>Renovação</option></select></div>
          <div class="col-md-4"><label>Seguradora</label><input class="form-control" name="seguradora"></div>
          <div class="col-md-4"><label>Classe de Bônus</label><input class="form-control" name="bonus"></div>
          <div class="col-md-6"><label>Apólice
