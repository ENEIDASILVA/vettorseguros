<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VETTOR SEGUROS | Cotação Online</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    header {
      background-color: #004aad;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      padding: 20px;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: 0 auto;
    }
    form label {
      margin-top: 10px;
      font-weight: bold;
    }
    form button {
      margin-top: 20px;
      background-color: #004aad;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
    }
    form button:hover {
      background-color: #003080;
    }
    .success-message {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Seguro Automotivo - Cotação Online</h1>
  </header>

  <main>
    <h2>Preencha o formulário para receber sua cotação</h2>

    <!-- Formulário integrado ao Formspree -->
    <form id="cotacaoForm" action="https://formspree.io/f/mlgynkkz" method="POST">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" class="form-control" required>

      <label for="telefone">Telefone:</label>
      <input type="text" id="telefone" name="telefone" class="form-control" placeholder="(31) 99999-9999" required>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" class="form-control" required>

      <label for="veiculo">Veículo:</label>
      <input type="text" id="veiculo" name="veiculo" class="form-control" placeholder="Ex: Honda Civic 2020" required>

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" class="form-control" rows="4" required></textarea>

      <!-- Campo oculto para identificar origem -->
      <input type="hidden" name="origem" value="Seguro Automotivo">

      <button type="submit">Enviar</button>
    </form>

    <!-- Mensagem de sucesso -->
    <div class="success-message" id="successMessage">
      ✅ Obrigado! Sua cotação foi enviada com sucesso. Em breve entraremos em contato.
    </div>
  </main>

  <script>
  document.addEventListener("DOMContentLoaded", function() {
    const telefoneInput = document.getElementById("telefone");

    // Máscara de telefone
    telefoneInput.addEventListener("input", function() {
      let value = telefoneInput.value.replace(/\D/g, "");
      if (value.length > 11) value = value.slice(0, 11);

      if (value.length > 6) {
        telefoneInput.value = `(${value.slice(0,2)}) ${value.slice(2,7)}-${value.slice(7)}`;
      } else if (value.length > 2) {
        telefoneInput.value = `(${value.slice(0,2)}) ${value.slice(2)}`;
      } else {
        telefoneInput.value = value;
      }
    });

    // Envio do formulário com limpeza
    const form = document.getElementById("cotacaoForm");
    const successMessage = document.getElementById("successMessage");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        form.reset(); // limpa todos os campos
        successMessage.style.display = "block"; // mostra mensagem
        // esconde a mensagem após 5 segundos
        setTimeout(() => {
          successMessage.style.display = "none";
        }, 5000);
      } else {
        alert("Ocorreu um erro ao enviar. Tente novamente.");
      }
    });
  });
</script>

</body>
</html>

</body>
</html>
