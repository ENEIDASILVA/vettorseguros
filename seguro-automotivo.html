<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VETTOR Corretora de Seguros | Cotação Online</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#f5f7fa;
  font-family:Arial, Helvetica, sans-serif;
}
header {
  background:#0A2F5A;
  padding:25px;
  color:white;
  text-align:center;
}
header img {
  max-width:100%;
  height:auto;
}
.card {
  margin-top:30px;
  border:none;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.10);
}
.section-title {
  color:#0A2F5A;
  font-size:22px;
  font-weight:bold;
  margin-top:30px;
  margin-bottom:20px;
  border-bottom:2px solid #C9A227;
  padding-bottom:8px;
}
.btn-vettor {
  background:#0A2F5A;
  color:white;
  padding:15px;
  font-size:18px;
  font-weight:bold;
}
.btn-vettor:hover {
  background:#153f72;
  color:white;
}
.success-message {
  display:none;
  margin-top:20px;
  padding:15px;
  background-color:#d4edda;
  color:#155724;
  border:1px solid #c3e6cb;
  border-radius:5px;
}
</style>
</head>

<body>
<header>
  <h1>VETTOR Corretora de Seguros</h1>
  <p>Solicite sua Cotação Online</p>
  <img src="imagens/banner-principal.jpg" alt="Banner" id="bannerImg">
</header>

<div class="container">
  <div class="card">
    <div class="card-body">

      <!-- Formulário integrado ao Formspree -->
      <form id="cotacaoForm" action="https://formspree.io/f/mlgynkkz" method="POST">
        
        <!-- Questionário original -->
        <div class="section-title">1. Dados do Segurado</div>
        <div class="row">
          <div class="col-md-6">
            <label>Nome Completo *</label>
            <input class="form-control" name="nome" required>
          </div>
          <div class="col-md-6">
            <label>CPF *</label>
            <input class="form-control" name="cpf">
          </div>
          <div class="col-md-4">
            <label>Data de Nascimento</label>
            <input type="date" class="form-control" name="data_nascimento">
          </div>
          <div class="col-md-4">
            <label>Estado Civil</label>
            <input class="form-control" name="estado_civil">
          </div>
          <div class="col-md-4">
            <label>Profissão</label>
            <input class="form-control" name="profissao">
          </div>
          <div class="col-md-6">
            <label>Escolaridade</label>
            <input class="form-control" name="escolaridade">
          </div>
          <div class="col-md-6">
            <label>E-mail</label>
            <input type="email" class="form-control" name="email">
          </div>
          <div class="col-md-6">
            <label>Telefone</label>
            <input class="form-control" name="telefone">
          </div>
          <div class="col-md-6">
            <label>CEP</label>
            <input class="form-control" name="cep">
          </div>
          <div class="col-12">
            <label>Endereço</label>
            <input class="form-control" name="endereco">
          </div>
        </div>

        <!-- Continue adicionando name="..." em todos os campos do questionário (Veículo, Utilização, Condutor, Seguro Atual, Coberturas, etc.) -->

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-vettor">🚗 SOLICITAR MINHA COTAÇÃO</button>
        </div>
      </form>

      <!-- Mensagem de sucesso -->
      <div class="success-message" id="successMessage">
        ✅ Obrigado! Sua cotação foi enviada com sucesso. Em breve entraremos em contato.
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const form = document.getElementById("cotacaoForm");
  const successMessage = document.getElementById("successMessage");
  const bannerImg = document.getElementById("bannerImg");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const data = new FormData(form);

    const response = await fetch(form.action, {
      method: form.method,
      body: data,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      form.reset(); // limpa todos os campos
      if (bannerImg) {
        bannerImg.style.display = "none"; // esconde a imagem/banner
      }
      successMessage.style.display = "block"; // mostra mensagem
      setTimeout(() => {
        successMessage.style.display = "none"; // esconde após 5s
      }, 5000);
    } else {
      alert("❌ Ocorreu um erro ao enviar. Tente novamente.");
    }
  });
});
</script>
</body>
</html>
