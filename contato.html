<body>

  <main>
    <h2>Fale Conosco</h2>
    <p>Preencha o formulário abaixo e entraremos em contato com você o mais breve possível.</p>

    <!-- Formulário com Formspree -->
    <form id="contato-form" action="https://formspree.io/f/mlgynkkz" method="POST" class="form-contato">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="telefone">Telefone:</label>
      <input type="text" id="telefone" name="telefone" placeholder="(31) 99999-9999" required>
      
      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required>

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

      <button type="submit">Enviar</button>
    </form>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const telefoneInput = document.getElementById("telefone");

    telefoneInput.addEventListener("input", function(e) {
      let value = telefoneInput.value.replace(/\D/g, ""); // remove tudo que não for número

      if (value.length > 11) {
        value = value.slice(0, 11); // limita a 11 dígitos
      }

      // aplica a máscara (xx) xxxxx-xxxx
      if (value.length > 6) {
        telefoneInput.value = `(${value.slice(0,2)}) ${value.slice(2,7)}-${value.slice(7)}`;
      } else if (value.length > 2) {
        telefoneInput.value = `(${value.slice(0,2)}) ${value.slice(2)}`;
      } else {
        telefoneInput.value = value;
      }
    });
  });
</script>




    
    <!-- Mensagens de feedback -->
    <p id="mensagem-sucesso">✅ Seu contato foi enviado com sucesso!</p>
    <p id="mensagem-erro">❌ Não foi possível enviar sua mensagem. Tente novamente mais tarde.</p>

    <p><a href="index.html" class="voltar">← Voltar para a página principal</a></p>
  </main>

  <footer>
    <p>© 2026 Vettor Corretora de Seguros</p>
  </footer>

  <!-- Script para menu responsivo e envio do formulário -->
  <script>
    // Menu responsivo
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    toggle.addEventListener('click', () => {
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    });

    // Envio do formulário sem redirecionar
    const form = document.getElementById('contato-form');
    const mensagemSucesso = document.getElementById('mensagem-sucesso');
    const mensagemErro = document.getElementById('mensagem-erro');

    form.addEventListener('submit', async function(event) {
      event.preventDefault(); // impede redirecionamento padrão

      const dados = new FormData(form);
      try {
        const resposta = await fetch(form.action, {
          method: form.method,
          body: dados,
          headers: { 'Accept': 'application/json' }
        });

        if (resposta.ok) {
          mensagemSucesso.classList.add('mostrar'); // aplica fade-in
          mensagemErro.classList.remove('mostrar');
          form.reset(); // limpa os campos
        } else {
          mensagemErro.classList.add('mostrar');
          mensagemSucesso.classList.remove('mostrar');
        }
      } catch (erro) {
        mensagemErro.classList.add('mostrar');
        mensagemSucesso.classList.remove('mostrar');
      }
    });
  </script>
</body>
</html>
